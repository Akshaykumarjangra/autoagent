# ═══════════════════════════════════════════════
# Autonomix Global Swarm — Docker Compose
# ═══════════════════════════════════════════════

version: '3.8'

services:
  autonomix:
    build: .
    container_name: autonomix-swarm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend/.env.local:/app/backend/.env.local:ro
      - autonomix-data:/app/backend/data
      - autonomix-uploads:/app/backend/uploads
    environment:
      - NODE_ENV=production
      - API_BACKEND_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: autonomix-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - autonomix

volumes:
  autonomix-data:
  autonomix-uploads:
